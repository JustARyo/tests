            border-radius: 8px;
            font-size: 15px;

            color: #1e3c72;

        }

            align-items: center;

            font-size: 18px;
            font-weight: 600;
            color: #1e3c72;
        }

            font-family: 'Noto Sans', sans-serif;
            padding: 12px 20px;
            border: 2px solid #d0d9e8;
            border-radius: 8px;
            font-size: 15px;
            min-width: 300px;
            cursor: pointer;
            background: white;
            color: #333;

            outline: none;
            border-color: #2a5298;
        }

            background: #f5f5f5;
            cursor: not-allowed;
            opacity: 0.7;
        }

            background: #f8fafd;
            border-radius: 10px;
            padding: 30px;
            min-height: 300px;
            border: 2px solid #d0d9e8;
            line-height: 1.8;
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Noto Sans', sans-serif;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .text-display p {
            margin-bottom: 20px;
        }

        .text-display p:last-child {
            margin-bottom: 0;
        }

        .empty-state {
            color: #999;
            text-align: center;
            font-style: italic;
            padding: 50px 20px;
            font-size: 16px;

            gap: 25px;

            padding: 10px;

            border-radius: 5px;

            color: #1e3c72;

            gap: 15px;
            color: #2a5298;
            font-size: 14px;
            margin-bottom: 10px;

</head>

    <div class="container">

        </div>

            <strong>📝 Примечание:</strong> Тексты представлены в фонетической транскрипции.
        </div>
    </div>

            ter: {
                name: "Тер-саамский",
                texts: {
                    text1: {
                        title: "Текст 1",
                        content: "<p>Здесь будут тексты на тер-саамском языке.</p><p>Этот раздел находится в разработке.</p>"
                    }

        let currentLanguage = 'ter'; // По умолчанию показываем тер-саамский

        function selectLanguage(lang, btn) {
            currentLanguage = lang;
    
            // Обновляем активную кнопку
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
    
            // Обновляем заголовок
            document.getElementById('languageTitle').textContent = `Тексты на ${languageData[lang].name}`;
    
            // Обновляем выпадающий список
            const selector = document.getElementById('textSelector');
            selector.innerHTML = '<option value="">-- Выберите текст --</option>';
    
            const texts = languageData[lang].texts;
            for (const [key, text] of Object.entries(texts)) {
                const option = document.createElement('option');
                option.value = key;
                 option.textContent = text.title;
                selector.appendChild(option);
            }
    
            // Очищаем отображение текста
            document.getElementById('textDisplay').innerHTML = '<div class="empty-state">👆 Выберите текст из списка</div>';
            document.getElementById('stats').innerHTML = '';
        }

        function showSelectedText() {
            const selector = document.getElementById('textSelector');
            const display = document.getElementById('textDisplay');
            const stats = document.getElementById('stats');
            const selectedValue = selector.value;

            if (!selectedValue) {
                display.innerHTML = '<div class="empty-state">👆 Пожалуйста, выберите текст</div>';
                stats.innerHTML = '';
                return;
            }

            const textData = languageData[currentLanguage].texts[selectedValue];
            
            if (textData) {
                display.innerHTML = textData.content;
                
                // Подсчитываем статистику
                const plainText = textData.content.replace(/<[^>]*>/g, ' ');
                const wordCount = plainText.split(/\s+/).filter(word => word.length > 0).length;
                const charCount = plainText.replace(/\s+/g, '').length;
                const linesCount = textData.content.split('<br>').length;
                
                stats.innerHTML = `
                    <span>📊 Язык: <strong>${languageData[currentLanguage].name}</strong></span>
                    <span>📝 Строк: ${linesCount}</span>
                    <span>📏 Символов: ${charCount}</span>
                `;
            }
        }

        // Инициализация при загрузке страницы
        window.onload = function() {
            // Устанавливаем тер-саамский как активный по умолчанию
            selectLanguage('ter');
        };
