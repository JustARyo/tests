<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Саамские тексты - расширенный просмотр</title>
    <!-- Подключаем шрифты: Noto Sans и DejaVu Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-weight: 600;
            border-bottom: 3px solid #2a5298;
            padding-bottom: 10px;
        }

        .language-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f4f8;
            padding: 15px;
            border-radius: 10px;
        }

        .lang-btn {
            font-family: 'Noto Sans', sans-serif;
            padding: 12px 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #1e3c72;
            border: 2px solid transparent;
            width: 100%;
            text-align: center;
        }

        .lang-btn:hover {
            background: #e3e9f2;
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: #2a5298;
            color: white;
            border-color: #1e3c72;
        }

        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .file-browser {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #d0d9e8;
            height: fit-content;
        }

        .browser-header {
            font-size: 16px;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #2a5298;
        }

        .file-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }

        .file-item {
            padding: 10px 12px;
            margin-bottom: 5px;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            font-size: 14px;
            word-break: break-word;
        }

        .file-item:hover {
            background: #e3e9f2;
            transform: translateX(3px);
            border-color: #2a5298;
        }

        .file-item.active {
            background: #2a5298;
            color: white;
            border-color: #1e3c72;
        }

        .file-icon {
            margin-right: 8px;
            font-size: 16px;
        }

        .text-display {
            background: #f8fafd;
            border-radius: 10px;
            padding: 25px;
            min-height: 600px;
            border: 2px solid #d0d9e8;
            line-height: 1.8;
            font-size: 16px;
            font-family: 'Noto Sans', sans-serif;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: auto;
            position: relative;
        }

        .text-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d0d9e8;
        }

        .text-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e3c72;
        }

        .info-button {
            background: none;
            border: 2px solid #2a5298;
            color: #2a5298;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-button:hover {
            background: #2a5298;
            color: white;
        }

        .info-button.hidden {
            display: none;
        }

        .text-content {
            font-size: 16px;
            font-family: 'DejaVu Sans', 'Noto Sans', sans-serif;
        }

        .text-content p {
            margin-bottom: 20px;
        }

        .text-content p:last-child {
            margin-bottom: 0;
        }

        /* Стили для разных типов слов */
        .text-content span.word-marked {
            color: #2e7d32; /* Темно-зеленый */
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }
        
        .text-content span.word-marked:hover {
            background-color: #e8f5e9;
            border-radius: 4px;
            outline: 1px solid #2e7d32;
        }

        .text-content span.word-unmarked {
            color: #c62828; /* Темно-красный */
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }
        
        .text-content span.word-unmarked:hover {
            background-color: #ffebee;
            border-radius: 4px;
            outline: 1px solid #c62828;
        }

        .text-content span.word-started {
            color: #b8860b; /* Темно-желтый/оранжевый */
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        .text-content span.word-started:hover {
            background-color: #fff8e0;
            border-radius: 4px;
            outline: 1px solid #b8860b;
        }

        .text-content span.non-clickable {
            color: #000000; /* Черный */
            cursor: default;
        }

        .word-info-panel {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #d0d9e8;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .word-info-header {
            font-size: 16px;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #2a5298;
        }

        .word-display {
            font-size: 32px;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 20px;
            text-align: center;
            word-break: break-word;
            font-family: 'DejaVu Sans', 'Noto Sans', sans-serif;
        }

        .word-attributes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .attribute-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #2a5298;
            transition: border-left-color 0.2s;
        }
        .attribute-item.missing {
            border-left-color: #c62828;

        .attribute-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .attribute-value {
            font-size: 16px;
            color: #1e3c72;
            font-weight: 500;
            min-height: 24px;
            font-family: 'DejaVu Sans', 'Noto Sans', sans-serif;
        }

         .attribute-value.missing {
            color: #c62828; /* Красный текст для "не указано" */
        }
            
        .empty-state-small {
            color: #999;
            text-align: center;
            font-style: italic;
            padding: 20px;
            font-size: 14px;
        }

        .empty-state {
            color: #999;
            text-align: center;
            font-style: italic;
            padding: 60px 20px;
            font-size: 16px;
        }

        .stats {
            margin-top: 15px;
            color: #555;
            font-size: 14px;
            display: flex;
            gap: 25px;
            justify-content: flex-end;
            padding: 10px;
            background: #f0f4f8;
            border-radius: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2a5298;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e3c72;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-close:hover {
            background: #f0f0f0;
        }

        .lang-btn, .file-item, .info-button, .modal-close {
            transform: none !important;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s !important;
        }

        .lang-btn:hover, .file-item:hover, .info-button:hover, .modal-close:hover {
            transform: none !important;
        }

        .modal-body {
            line-height: 1.8;
        }

        .source-info {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8fafd;
            border-radius: 8px;
        }
        
        .source-link {
            color: #2a5298;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dashed #2a5298;
        }
        
        .source-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            color: #d32f2f;
            text-align: center;
            padding: 30px;
            background: #ffebee;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Корпус саамских языков Кольского полуострова</h1>
        
        <div class="language-section">
            <button class="lang-btn" data-lang="skolt">Колтта-саамский</button>
            <button class="lang-btn" data-lang="akkala">Аккала-саамский</button>
            <button class="lang-btn" data-lang="kildin">Кильдин-саамский</button>
            <button class="lang-btn active" data-lang="ter">Тер-саамский</button>
        </div>

        <div class="main-content">
            <div class="file-browser">
                <div class="browser-header" id="browserHeader">
                    📁 Файлы: тер-саамский
                </div>
                <ul class="file-list" id="fileList">
                    <li class="file-item" style="background: transparent; cursor: default; color: #666;">
                        ⏳ Загрузка...
                    </li>
                </ul>
            </div>

            <div id="textDisplay" class="text-display">
                <div class="text-header">
                    <span class="text-title" id="currentTextTitle"></span>
                    <button class="info-button" id="textInfoBtn" title="Информация о тексте">i</button>
                </div>
                <div class="text-content" id="textContent">
                    <div class="empty-state">
                        👆 Выберите файл в браузере слева
                    </div>
                </div>
            </div>

            <div class="word-info-panel" id="wordInfoPanel">
                <div class="word-info-header">
                    📖 Информация о слове
                </div>
                <div id="wordInfoContent">
                    <div class="empty-state-small">
                        👆 Нажмите на любое слово в тексте
                    </div>
                </div>
            </div>
        </div>

        <div id="stats" class="stats"></div>
    </div>

    <div class="modal" id="textInfoModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">ℹ️ Информация о тексте</span>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Данные будут подставляться динамически -->
            </div>
        </div>
    </div>

    <script>
        const languageData = {
            skolt: {
                name: "колтта-саамский",
                texts: [
                    { 
                        id: "skolt", 
                        title: "Текст 1", 
                        file: "texts/skolt/example.json",
                        info: null
                    }
                ]
            },
            akkala: {
                name: "аккала-саамский",
                texts: [
                    { 
                        id: "akkala1", 
                        title: "Как пекли хлеб?", 
                        file: "texts/akkala/kert-1.json",
                        info: {
                            source: "Керт Г. М., Зайков П. М. Образцы саамской речи / науч. ред. В. З. Панфилов; сост. Г. М. Керт, П. М. Зайков. — Петрозаводск: Карельский филиал АН СССР, Институт языка, литературы и истории, 1988. — С. 12. — 192 с.",
                            link: "https://saami.su/biblioteka-saamskij-yazyk/obraztsy-saamskoj-rechi.html",
                            informant: "не указано"
                        }
                    },
                    { 
                        id: "akkala2", 
                        title: "Как солили рыбу?", 
                        file: "texts/akkala/kert-2.json",
                        info: {
                            source: "Керт Г. М., Зайков П. М. Образцы саамской речи / науч. ред. В. З. Панфилов; сост. Г. М. Керт, П. М. Зайков. — Петрозаводск: Карельский филиал АН СССР, Институт языка, литературы и истории, 1988. — С. 15. — 192 с.",
                            link: "https://saami.su/biblioteka-saamskij-yazyk/obraztsy-saamskoj-rechi.html",
                            informant: "Антонова А.А., 1928 г.р., с. Бабенск"
                        }
                    }
                ]
            },
            kildin: {
                name: "кильдин-саамский",
                texts: [
                    { 
                        id: "kildin", 
                        title: "Текст 1", 
                        file: "texts/kildin/example.json",
                        info: null
                    }
                ]
            },
            ter: {
                name: "тер-саамский",
                texts: [
                    { 
                        id: "ter", 
                        title: "Текст 1", 
                        file: "texts/ter/example.json",
                        info: null
                    }
                ]
            }
        };

        let currentLanguage = 'ter';
        let currentFileId = null;
        let currentFileData = null;
        let currentWordData = null;
        let currentTextInfo = null;

        const modal = document.getElementById('textInfoModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const textInfoBtn = document.getElementById('textInfoBtn');

        function openModal() {
            if (currentTextInfo) {
                modal.classList.add('active');
            }
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        closeModalBtn.addEventListener('click', closeModal);

        function updateBrowserHeader() {
            const header = document.getElementById('browserHeader');
            header.textContent = `📁 Файлы: ${languageData[currentLanguage].name}`;
        }

        function loadFileList(lang) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<li class="file-item" style="background: transparent; cursor: default; color: #666;">⏳ Загрузка файлов...</li>';
            
            setTimeout(() => {
                fileList.innerHTML = '';
                
                const texts = languageData[lang].texts;
                
                if (texts.length === 0) {
                    fileList.innerHTML = '<li class="file-item" style="background: transparent; cursor: default; color: #999;">📭 Нет файлов</li>';
                    return;
                }
                
                texts.forEach(text => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    if (currentFileId === text.id) {
                        li.classList.add('active');
                    }
                    li.innerHTML = `<span class="file-icon">📄</span> ${text.title}`;
                    li.dataset.id = text.id;
                    li.dataset.file = text.file;
                    li.dataset.title = text.title;
                    li.dataset.hasInfo = text.info ? 'true' : 'false';
                    li.addEventListener('click', () => selectFile(text.id, text.file, text.title, text.info, li));
                    fileList.appendChild(li);
                });
            }, 100);
        }

        function selectFile(fileId, filePath, fileTitle, fileInfo, element) {
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (element) {
                element.classList.add('active');
            }
            
            currentFileId = fileId;
            currentFileName = fileTitle;
            currentTextInfo = fileInfo;
            
            document.getElementById('currentTextTitle').textContent = fileTitle;
            
            // Показываем/скрываем кнопку информации
            if (fileInfo) {
                textInfoBtn.classList.remove('hidden');
            } else {
                textInfoBtn.classList.add('hidden');
            }
            
            loadTextContent(filePath);
        }

        // Функция для разделения слова и знаков препинания
        function splitWordAndPunctuation(token) {
            const match = token.match(/^([.,!?;:()\[\]{}<>""''\-–—\/\\]*)(.*?)([.,!?;:()\[\]{}<>""''\-–—\/\\]*)$/);
            if (match) {
                return {
                    leading: match[1] || '',
                    word: match[2] || '',
                    trailing: match[3] || ''
                };
            }
            return {
                leading: '',
                word: token,
                trailing: ''
            };
        }

        // Проверка, является ли токен только знаками препинания
        function isOnlyPunctuation(token) {
            return /^[.,!?;:()\[\]{}<>""''\-–—\/\\]+$/.test(token);
        }

        function setupWordClickHandlers() {
            const words = document.querySelectorAll('.text-content span.word-marked, .text-content span.word-unmarked, .text-content span.word-started');
            words.forEach(span => {
                span.addEventListener('click', (e) => {
                    const rawWord = e.target.textContent;
                    const wordIndex = e.target.dataset.index;
                    showWordInfo(rawWord, wordIndex);
                });
            });
        }

        function showWordInfo(rawWord, wordIndex) {
    const infoContent = document.getElementById('wordInfoContent');
    
    // Берем данные из массива по индексу
    const wordData = currentWordData[wordIndex];
    
    if (wordData) {
        // Проверяем каждое поле на наличие данных
        const posMissing = !wordData.pos;
        const formMissing = !wordData.form;
        const lemmaMissing = !wordData.lemma;
        const transMissing = !(wordData.translation || wordData.trans);
        
        infoContent.innerHTML = `
            <div class="word-display">${rawWord}</div>
            <div class="word-attributes">
                <div class="attribute-item ${posMissing ? 'missing' : ''}">
                    <div class="attribute-label">Часть речи</div>
                    <div class="attribute-value ${posMissing ? 'missing' : ''}">${wordData.pos || '<em>не указано</em>'}</div>
                </div>
                <div class="attribute-item ${formMissing ? 'missing' : ''}">
                    <div class="attribute-label">Грамматическая форма</div>
                    <div class="attribute-value ${formMissing ? 'missing' : ''}">${wordData.form || '<em>не указано</em>'}</div>
                </div>
                <div class="attribute-item ${lemmaMissing ? 'missing' : ''}">
                    <div class="attribute-label">Начальная форма</div>
                    <div class="attribute-value ${lemmaMissing ? 'missing' : ''}">${wordData.lemma || '<em>не указано</em>'}</div>
                </div>
                <div class="attribute-item ${transMissing ? 'missing' : ''}">
                    <div class="attribute-label">Перевод</div>
                    <div class="attribute-value ${transMissing ? 'missing' : ''}">${wordData.translation || wordData.trans || '<em>не указано</em>'}</div>
                </div>
            </div>
        `;
    }
}
        async function loadTextContent(filePath) {
            const textContent = document.getElementById('textContent');
            textContent.innerHTML = '<div class="loading">⏳ Загрузка текста...</div>';
            
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('Файл не найден');
                
                const data = await response.json();
                
                // Сохраняем данные о словах (массив)
                currentWordData = data.words || [];
                console.log('Загруженные данные о словах:', currentWordData);
                
                const text = data.text || '';
                
                // Разбиваем на строки
                const lines = text.split('\n').filter(line => line.trim().length > 0);
                
                let formattedHtml = '';
                let wordIndex = 0;
                
                lines.forEach(line => {
                    // Разбиваем на токены (слова и знаки препинания)
                    const tokens = line.match(/(\s+|[^\s]+)/g) || [];
                    
                    const lineHtml = tokens.map(token => {
                        // Если это пробел - оставляем как есть
                        if (/^\s+$/.test(token)) {
                            return token;
                        }
                        
                        // Если это только знаки препинания
                        if (isOnlyPunctuation(token)) {
                            return `<span class="non-clickable">${token}</span>`;
                        }
                        
                        // Разделяем слово и знаки препинания
                        const parts = splitWordAndPunctuation(token);
                        
                        let result = '';
                        
                        // Добавляем начальные знаки препинания
                        if (parts.leading) {
                            result += `<span class="non-clickable">${parts.leading}</span>`;
                        }
                        
                        // Обрабатываем само слово
                        if (parts.word) {
                            // Проверяем статус слова
                            let wordStatus = 'unmarked'; // по умолчанию красный
                            
                            if (currentWordData && currentWordData[wordIndex]) {
                                const wordData = currentWordData[wordIndex];
                                
                                // Считаем количество заполненных полей (pos, form, lemma, translation/trans)
                                const fields = [
                                    wordData.pos, 
                                    wordData.form, 
                                    wordData.lemma, 
                                    wordData.translation || wordData.trans
                                ];
                                
                                const filledCount = fields.filter(field => field !== null && field !== undefined && field !== '').length;
                                
                                if (filledCount === 0) {
                                    wordStatus = 'unmarked'; // красный - ничего не заполнено
                                } else if (filledCount < 4) {
                                    wordStatus = 'started'; // желтый - заполнено частично
                                } else {
                                    wordStatus = 'marked'; // зеленый - заполнено всё
                                }
                            }
                            
                            let className = '';
                            switch(wordStatus) {
                                case 'marked':
                                    className = 'word-marked';
                                    break;
                                case 'started':
                                    className = 'word-started';
                                    break;
                                default:
                                    className = 'word-unmarked';
                            }
                            
                            result += `<span class="${className}" data-index="${wordIndex}">${parts.word}</span>`;
                            
                            wordIndex++;
                        }
                        
                        // Добавляем конечные знаки препинания
                        if (parts.trailing) {
                            result += `<span class="non-clickable">${parts.trailing}</span>`;
                        }
                        
                        return result;
                    }).join('');
                    
                    formattedHtml += `<p>${lineHtml}</p>`;
                });
                
                textContent.innerHTML = formattedHtml || '<p>[Пустой файл]</p>';
                
                setupWordClickHandlers();
                
                updateStats();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                textContent.innerHTML = `<div class="error">❌ Ошибка загрузки файла: ${filePath}<br>Убедитесь, что файл существует и имеет правильный формат JSON.</div>`;
            }
        }
        
        function updateStats() {
            const stats = document.getElementById('stats');
            
            // Подсчитываем размеченные, начатые и неразмеченные слова
            const markedCount = document.querySelectorAll('.text-content span.word-marked').length;
            const startedCount = document.querySelectorAll('.text-content span.word-started').length;
            const unmarkedCount = document.querySelectorAll('.text-content span.word-unmarked').length;
            
            stats.innerHTML = `
                <span>📊 Слов в тексте: <strong>${markedCount + startedCount + unmarkedCount}</strong></span>
                <span style="color: #c62828;">❌ Неразмеченных слов: ${unmarkedCount}</span>
                <span style="color: #ed6c02;">🟡 Начатых слов: ${startedCount}</span>
            `;
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                currentLanguage = this.dataset.lang;
                currentFileId = null;
                currentWordData = null;
                currentTextInfo = null;
                
                // Скрываем кнопку информации
                textInfoBtn.classList.add('hidden');
                
                updateBrowserHeader();
                loadFileList(currentLanguage);
                
                document.getElementById('currentTextTitle').textContent = '';
                document.getElementById('textContent').innerHTML = '<div class="empty-state">👆 Выберите файл в браузере слева</div>';
                document.getElementById('wordInfoContent').innerHTML = '<div class="empty-state-small">👆 Нажмите на любое слово в тексте</div>';
                document.getElementById('stats').innerHTML = '';
            });
        });

        textInfoBtn.addEventListener('click', function() {
            if (currentTextInfo) {
                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="source-info">
                        <strong>Источник:</strong><br>
                        <a href="${currentTextInfo.link}" 
                           target="_blank" 
                           class="source-link">
                            ${currentTextInfo.source}
                        </a>
                    </div>
                    <p>
                        <strong>Сведения об информанте:</strong><br>
                        <em>${currentTextInfo.informant || 'не указано'}</em>
                    </p>
                `;
                openModal();
            }
        });

        window.onload = function() {
            updateBrowserHeader();
            // Скрываем кнопку информации при загрузке
            textInfoBtn.classList.add('hidden');
            loadFileList('ter');
            document.getElementById('currentTextTitle').textContent = '';
        };
    </script>
</body>
</html>
