<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Саамские тексты</title>
    <!-- Подключаем шрифт Noto Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-weight: 600;
            border-bottom: 3px solid #2a5298;
            padding-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-style: italic;
        }

        .language-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f4f8;
            padding: 15px;
            border-radius: 10px;
        }

        .lang-btn {
            font-family: 'Noto Sans', sans-serif;
            padding: 12px 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #1e3c72;
            border: 2px solid transparent;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lang-btn:hover {
            background: #e3e9f2;
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: #2a5298;
            color: white;
            border-color: #1e3c72;
        }

        .texts-section {
            margin-bottom: 25px;
        }

        .texts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .texts-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e3c72;
        }

        select {
            font-family: 'Noto Sans', sans-serif;
            padding: 12px 20px;
            border: 2px solid #d0d9e8;
            border-radius: 8px;
            font-size: 15px;
            min-width: 300px;
            cursor: pointer;
            background: white;
            color: #333;
        }

        select:focus {
            outline: none;
            border-color: #2a5298;
        }

        select:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .text-display {
            background: #f8fafd;
            border-radius: 10px;
            padding: 30px;
            min-height: 300px;
            border: 2px solid #d0d9e8;
            line-height: 1.8;
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Noto Sans', sans-serif;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .text-display p {
            margin-bottom: 20px;
        }

        .text-display p:last-child {
            margin-bottom: 0;
        }

        .empty-state {
            color: #999;
            text-align: center;
            font-style: italic;
            padding: 50px 20px;
            font-size: 16px;
        }

        .stats {
            margin-top: 15px;
            color: #555;
            font-size: 14px;
            display: flex;
            gap: 25px;
            justify-content: flex-end;
            padding: 10px;
            background: #f0f4f8;
            border-radius: 8px;
        }

        .note {
            background: #e8f0fe;
            border-left: 4px solid #2a5298;
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 14px;
            color: #1e3c72;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            color: #d32f2f;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Саамские тексты</h1>
        
        <div class="language-section">
            <button class="lang-btn" data-lang="skolt">Колтта-саамский</button>
            <button class="lang-btn" data-lang="akkala">Аккала-саамский</button>
            <button class="lang-btn" data-lang="kildin">Кильдин-саамский</button>
            <button class="lang-btn active" data-lang="ter">Тер-саамский</button>
        </div>

        <div class="texts-section">
            <div class="texts-header">
                <span class="texts-title" id="languageTitle">Тексты на тер-саамском</span>
                <select id="textSelector">
                    <option value="">-- Выберите текст --</option>
                </select>
            </div>

            <div id="textDisplay" class="text-display">
                <div class="empty-state">
                    👆 Выберите язык и текст для отображения
                </div>
            </div>

            <div id="stats" class="stats"></div>
        </div>
    </div>

    <script>
        // Структура языков и их текстовых файлов
        const languageData = {
            skolt: {
                name: "Колтта-саамский",
                texts: [
                    { id: "skolt", title: "Текст 1", file: "texts/skolt/example.txt" }
                ]
            },
            akkala: {
                name: "Аккала-саамский",
                texts: [
                    { id: "akkala1", title: "Как пекли хлеб?", file: "texts/akkala/kert-1.txt" },
                    { id: "akkala2", title: "Как солили рыбу?", file: "texts/akkala/kert-2.txt" }
                ]
            },
            kildin: {
                name: "Кильдин-саамский",
                texts: [
                    { id: "kildin", title: "Текст 1", file: "texts/kildin/example.txt" }
                ]
            },
            ter: {
                name: "Тер-саамский",
                texts: [
                    { id: "ter", title: "Текст 1", file: "texts/ter/example.txt" }
                ]
            }
        };

        let currentLanguage = 'ter';

        // Загружаем список текстов для языка
        function loadLanguageTexts(lang) {
            const selector = document.getElementById('textSelector');
            selector.innerHTML = '<option value="">-- Загрузка... --</option>';
            
            // Имитация загрузки (в реальности данные уже в languageData)
            setTimeout(() => {
                selector.innerHTML = '<option value="">-- Выберите текст --</option>';
                
                const texts = languageData[lang].texts;
                texts.forEach(text => {
                    const option = document.createElement('option');
                    option.value = text.id;
                    option.dataset.file = text.file;
                    option.textContent = text.title;
                    selector.appendChild(option);
                });
            }, 100);
        }

        // Загружаем содержимое текстового файла
        async function loadTextContent(filePath) {
            const display = document.getElementById('textDisplay');
            display.innerHTML = '<div class="loading">⏳ Загрузка текста...</div>';
            
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('Файл не найден');
                const text = await response.text();
                
                // Форматируем текст с сохранением переносов строк
                const formattedText = text
                    .split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0)
                    .map(line => `<p>${line}</p>`)
                    .join('');
                
                return formattedText || '<p>[Пустой файл]</p>';
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                return `<div class="error">❌ Ошибка загрузки файла: ${filePath}<br>Убедитесь, что файл существует в репозитории.</div>`;
            }
        }

        // Показываем выбранный текст
        async function showSelectedText(textId) {
            const selector = document.getElementById('textSelector');
            const selectedOption = selector.querySelector(`option[value="${textId}"]`);
            
            if (!selectedOption) return;
            
            const filePath = selectedOption.dataset.file;
            const content = await loadTextContent(filePath);
            
            document.getElementById('textDisplay').innerHTML = content;
            
            // Обновляем статистику
            const stats = document.getElementById('stats');
            const plainText = content.replace(/<[^>]*>/g, ' ');
            const wordCount = plainText.split(/\s+/).filter(word => word.length > 0).length;
            const charCount = plainText.replace(/\s+/g, '').length;
            const linesCount = content.split('<p>').length - 1;
            
            stats.innerHTML = `
                <span>📊 Язык: <strong>${languageData[currentLanguage].name}</strong></span>
                <span>📝 Строк: ${linesCount}</span>
                <span>📏 Символов: ${charCount}</span>
            `;
        }

        // Обработчики событий
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Убираем активный класс у всех кнопок
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                // Добавляем активный класс нажатой кнопке
                this.classList.add('active');
                
                // Получаем выбранный язык
                currentLanguage = this.dataset.lang;
                
                // Обновляем заголовок
                document.getElementById('languageTitle').textContent = `Тексты на ${languageData[currentLanguage].name}`;
                
                // Загружаем список текстов для языка
                loadLanguageTexts(currentLanguage);
                
                // Очищаем отображение
                document.getElementById('textDisplay').innerHTML = '<div class="empty-state">👆 Выберите текст из списка</div>';
                document.getElementById('stats').innerHTML = '';
            });
        });

        // Обработчик выбора текста
        document.getElementById('textSelector').addEventListener('change', function(e) {
            const textId = e.target.value;
            if (textId) {
                showSelectedText(textId);
            } else {
                document.getElementById('textDisplay').innerHTML = '<div class="empty-state">👆 Выберите текст из списка</div>';
                document.getElementById('stats').innerHTML = '';
            }
        });

        // Инициализация
        window.onload = function() {
            loadLanguageTexts('ter');
        };
    </script>
</body>
</html>
